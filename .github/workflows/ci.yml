name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Assert no MQTT usage
        run: |
          ! grep -R -E -i "(paho-mqtt|import paho|from paho|homeassistant\.components\.mqtt|Platform\.MQTT)" custom_components src || (echo "MQTT dependency/import usage found" && exit 1)
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q
