name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Assert no MQTT usage
        run: |
          ! grep -R -E -i "(paho-mqtt|import paho|from paho|homeassistant\.components\.mqtt|Platform\.MQTT)" custom_components src || (echo "MQTT dependency/import usage found" && exit 1)
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q

  changelog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure CHANGELOG.md updated
        run: |
          git fetch origin "${{ github.base_ref }}"
          CHANGED_FILES="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          echo "$CHANGED_FILES"
          echo "$CHANGED_FILES" | grep -q '^CHANGELOG\.md$' || {
            echo "CHANGELOG.md must be updated for all pull requests."
            exit 1
          }
